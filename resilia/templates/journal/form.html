{% extends "base.html" %}

{% block content %}

<div class="container py-5">
  <div class="journal-form-container">

    <div class="journal-form-card">

      <h2 class="mb-4">New Journal Entry</h2>

      {% if prompt %}
        <div class="alert alert-light border mb-4">
          <strong>Reflection prompt</strong><br>
          {{ prompt.text }}
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="form-group mb-3">
          <label for="id_trigger">Trigger</label>
          {{ form.trigger }}
        </div>

        <div class="form-group mb-3">
          <label for="id_title">Title</label>
          {{ form.title }}
        </div>

        <div class="form-group mb-4">
          <label for="id_content">Your thoughts</label>
          {{ form.content }}
        </div>

        <button type="submit" class="btn btn-primary journal-save-btn">
          Save Entry
        </button>

      </form>

    </div>

  </div>
</div>

{% endblock %}
