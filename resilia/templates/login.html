{% extends "base.html" %}

{% block title %}Login | Resilia{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm p-4" style="background-color: var(--secondary); border-radius: 16px;">
                <h2 class="text-center mb-3">Welcome Back 🌙</h2>
                <p class="text-center mb-4">
                    Log in to access your personal anxiety trigger tracker.
                </p>

                <form method="post">
    {% csrf_token %}

    {{ form.non_field_errors }}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary w-100 mt-2">
        Log In
    </button>
</form>
   <div class="mt-3">
        <a href="/accounts/password_reset/" class="text-muted">
                  Forgot your password?
              </a>
            </div>
                <p class="text-center mt-3 mb-0">
                    New here?
                    <a href="{% url 'resilia:register' %}">Create an account</a>.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
