{% extends "base.html" %}

{% block title %}{{ exercise.title }} | Resilia{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 820px;">

    <!-- Back -->
    <a href="{% url 'resilia:tracker_list' %}"
       class="btn btn-sm btn-outline-secondary mb-4"
       style="border-radius: 999px;">
        ← Back to exercises
    </a>

    <!-- Exercise Card -->
    <div class="card shadow-sm" style="border-radius: 18px;">
        <div class="card-body p-4">

            <!-- Title -->
            <h2 class="mb-2">{{ exercise.title }}</h2>

            <!-- Description -->
            <p class="text-muted mb-4">
                {{ exercise.description }}
            </p>

            <!-- Mood Badge -->
            <div class="mb-4">
                <span class="badge bg-light text-dark px-3 py-2"
                      style="font-size: 0.85rem; border-radius: 999px;">
                    Best for: {{ exercise.get_mood_level_display }}
                </span>
            </div>

            <hr class="my-4">

            <!-- Instructions -->
            <h5 class="mb-3">Instructions</h5>

            <div class="p-3"
                 style="background:#f8f9fb; border-radius:14px; line-height:1.7;">
                {{ exercise.instructions|linebreaks }}
            </div>

        </div>
    </div>

</div>
{% endblock %}
