{% extends "base.html" %}

{% block content %}
<div class="container mt-5" style="max-width:500px;">

    <h2 class="mb-4">Reset Password</h2>

    <p class="text-muted">
        Enter your email address and we'll send you a password reset link.
    </p>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Send Reset Link
        </button>
    </form>

</div>
{% endblock %}
